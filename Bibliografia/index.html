<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliografía - Construcción Sostenible y Arquitectura Bioclimática</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-base: #054C50; 
            --accent-bright: #00f0ff; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(5, 76, 80, 0.4);
            --text-main: #ffffff;
            --text-dim: #ccdcdc;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #010a0b;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; cursor: default;
        }

        #custom-cursor-tool {
            position: fixed; pointer-events: none;
            background: var(--accent-bright); color: #000;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
            z-index: 9999; display: none;
            transform: translate(15px, 15px);
            box-shadow: 0 0 15px var(--accent-bright);
        }

        .fluid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #020f11; filter: blur(80px);
        }
        .fluid-layer { position: absolute; border-radius: 50%; opacity: 0.4; animation: fluidMove infinite alternate ease-in-out; }
        .layer-1 { background: radial-gradient(circle, var(--accent-base) 0%, transparent 70%); width: 100vw; height: 100vw; top: -30%; left: -10%; animation-duration: 20s; }
        .layer-2 { background: radial-gradient(circle, #021e20) 0%, transparent 70%); width: 80vw; height: 80vw; bottom: -20%; right: -10%; animation-duration: 25s; }
        @keyframes fluidMove { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 5%) scale(1.1); } }

        .nav-instruction {
            width: 90vw; max-width: 1400px;
            background: rgba(5, 76, 80, 0.2);
            border: 1px dashed var(--accent-bright);
            padding: 15px; border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem; color: var(--accent-bright);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-header { text-align: center; padding: 30px 20px; z-index: 1; }
        .main-header h1 { font-weight: 300; font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-header .line { width: 60px; height: 3px; background: var(--accent-bright); margin: 15px auto; }

        .reference-grid {
            display: grid; width: 90vw; max-width: 1400px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding-bottom: 80px; z-index: 1;
        }

        .card {
            font-family: 'Poppins', sans-serif;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 25px;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            min-height: 200px;
        }
        .card:hover { border-color: var(--accent-bright); transform: translateY(-5px); background: rgba(5, 76, 80, 0.12); box-shadow: 0 10px 20px rgba(5, 76, 80, 0.25); }

        .author-tag { font-size: 0.75rem; font-weight: 600; color: var(--accent-bright); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        .title { font-size: 0.9rem; font-weight: 400; line-height: 1.6; color: var(--text-main); margin-bottom: 15px; }

        .footer-info {
            font-size: 0.75rem; font-weight: 300; color: var(--text-dim);
            border-top: 1px solid rgba(5, 76, 80, 0.3);
            padding-top: 15px; margin-top: auto; word-break: break-word;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-visit { font-family: 'Poppins', sans-serif; text-decoration: none; background: var(--accent-bright); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; transition: background 0.2s; }
        .btn-visit:hover { background: #fff; }
        .btn-copy { font-family: 'Poppins', sans-serif; background: transparent; border: 1px solid var(--accent-bright); color: var(--accent-bright); padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background: var(--accent-bright); color: #000; }
        
    </style>
</head>
<body>

    <div id="custom-cursor-tool">¡Enlace Copiado!</div>

    <div class="fluid-background">
        <div class="fluid-layer layer-1"></div>
        <div class="fluid-layer layer-2"></div>
    </div>

    <div class="nav-instruction">
        🌱 <b>Instrucción de Navegación:</b> Consulta las directrices de huella de carbono, sistemas de certificación ambiental (LEED, BREEAM, EDGE) y análisis de ciclo de vida de materiales sustentables.
    </div>

    <header class="main-header">
        <h1>Sostenibilidad y Hábitat Sustentable</h1>
        <div class="line"></div>
    </header>

    <main class="reference-grid" id="grid"></main>

    <script>
        const sources = [
            { a: "BREEAM (2021)", t: "BREEAM Certification Systems and Standards", f: "Building Research Establishment Environmental Assessment Method", u: "https://breeam.com/" },
            { a: "Carneiro, A., & otros (2022)", t: "Energy consumption and carbon footprint of perovskite solar cells", f: "Energy Reports", u: "https://doi.org/10.1016/j.egyr.2022.01.045" },
            { a: "Carretero, M., & Sáez, P. M. (2021)", t: "Construction flaws in facing brick facades and the risk of associated litigation", f: "Journal of Building Engineering", u: "https://doi.org/10.1016/j.jobe.2020.101633" },
            { a: "CCCS (2020)", t: "Recursos y normativas de edificación sustentable", f: "Consejo Colombiano de Construcción Sostenible", u: "https://www.cccs.org.co/" },
            { a: "Dixit, M. K. (2017)", t: "Life cycle embodied energy analysis of residential buildings: A review of literature to investigate embodied energy parameters", f: "Renewable and Sustainable Energy Reviews, pp. 392–395", u: "https://doi.org/10.1016/j.rser.2017.05.051" },
            { a: "Doan, D., & otros (2017)", t: "A critical comparison of green building rating systems", f: "Sustainable Development - Building and Environment", u: "https://doi.org/10.1016/j.buildenv.2017.07.007" },
            { a: "Econova (2025)", t: "Ciclo de vida de un edificio: Definición y fases de análisis", f: "Econova Institute", u: "https://econova-institute.com/que-es-el-ciclo-de-vida-de-un-edificio/" },
            { a: "GBCE (2020)", t: "Manual de construcción sostenible: Buenas prácticas e indicadores", f: "Green Building Council España", u: "https://gbce.es" },
            { a: "González, E. (2025)", t: "Arquitectura bioclimática: construcciones que respetan el medio ambiente", f: "Structuralia Blog", u: "https://blog.structuralia.com/arquitectura-bioclimatica" },
            { a: "IEA (2021)", t: "Energy Efficiency 2022 Report", f: "International Energy Agency", u: "https://www.iea.org/reports/energy-efficiency-2022" },
            { a: "IFC (2019)", t: "Edge Buildings Resources and Guidelines", f: "International Finance Corporation", u: "https://edgebuildings.com/resources/?lang=es" },
            { a: "IOE, G. (2025)", t: "Desarrollo sostenible y transformación industrial", f: "Grupo IOE", u: "https://grupoioe.es/desarrollo-sostenible/" },
            { a: "Kibert, C. J. (2016)", t: "Sustainable Construction: Green Building Design and Delivery (4th ed.)", f: "John Wiley & Sons", u: null },
            { a: "MacNaughton, P., & otros (2017)", t: "The impact of working in a green certified building on cognitive function and health", f: "Building and Environment, pp. 180–182", u: null },
            { a: "Minunno, R., & otros (2021)", t: "Investigating the embodied energy and carbon of buildings: A systematic literature review and meta-analysis of life cycle assessments", f: "Renewable and Sustainable Energy Reviews, 143", u: null },
            { a: "Nature (2016)", t: "What is your carbon footprint? Definition and calculator resources", f: "The Nature Conservancy", u: "https://www.nature.org/en-us/get-involved/how-to-help/carbon-footprint-calculator/" },
            { a: "O'Connor, S., & otros (2021)", t: "Biogas production from small-scale anaerobic digestion plants on European farms", f: "Renewable and Sustainable Energy Reviews", u: "https://doi.org/10.1016/j.rser.2020.110580" },
            { a: "OECD (2020)", t: "OECD Environment Directorate and Policy Guidelines", f: "Organisation for Economic Co-operation and Development", u: "https://www.oecd.org/en/topics/environment.html" },
            { a: "Pexas, G., & otros (2021)", t: "Environmental and economic consequences of pig-cooling strategies implemented in a European pig-fattening unit", f: "Journal of Cleaner Production", u: "https://doi.org/10.1016/j.jclepro.2021.125784" },
            { a: "Quintero, A. (2013)", t: "Los métodos y procesos multicriterio para la evaluación", f: "Revista Luna Azul / SciELO", u: "http://www.scielo.org.co/pdf/luaz/n36/n36a14.pdf" },
            { a: "Reyes, J., & otros (2018)", t: "Urban Integrated Sustainable Assessment Methodology for Existing Neighborhoods (UISA fEN)", f: "Sustainable Development, pp. 3–5", u: "https://doi.org/10.1002/sd.1720" },
            { a: "UNEP (2021)", t: "2021 Global Status Report for Buildings and Construction", f: "United Nations Environment Programme", u: "https://www.unep.org/resources/report/2021-global-status-report-buildings-and-construction" },
            { a: "UNEP (2022)", t: "Global Status Report for Buildings and Construction", f: "United Nations Environment Programme", u: "https://www.unep.org/resources/publication/2022-global-status-report-buildings-and-construction" },
            { a: "USGBC (2020)", t: "LEED Core Concepts Guide", f: "U.S. Green Building Council", u: "https://www.usgbc.org/guide/bdc" },
            { a: "Viezzer, J., & Biondi, D. (2021)", t: "The influence of urban, socio-economic, and eco-environmental aspects on COVID-19 cases, deaths, and mortality: A multi-city case in the Atlantic Forest, Brazil", f: "Sustainable Cities and Society", u: null },
            { a: "Voisin, J., & otros (2020)", t: "Climate impact analysis on the optimal sizing of a stand-alone hybrid building", f: "Energy and Buildings", u: "https://doi.org/10.1016/j.enbuild.2019.109676" },
            { a: "Woodea (2024)", t: "Materiales de construcción sostenibles: claves para conocer el impacto en tus proyectos", f: "Woodea Innovación", u: "https://woodea.es/materiales-de-construccion-sostenibles-claves-para-conocer-el-impacto-en-tus-proyectos/" }
        ];

        const grid = document.getElementById('grid');
        const tool = document.getElementById('custom-cursor-tool');

        document.addEventListener('mousemove', (e) => {
            tool.style.left = e.clientX + 'px';
            tool.style.top = e.clientY + 'px';
        });

        sources.forEach((s) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `
                <div class="author-tag">${s.a}</div>
                <div class="title">${s.t}</div>
                <div class="footer-info">${s.f}</div>
            `;

            if(s.u) {
                html += `
                    <div class="btn-group">
                        <a href="${s.u}" target="_blank" class="btn-visit">Visitar</a>
                        <button class="btn-copy" onclick="copyLink('${s.u}')">Copiar Link</button>
                    </div>
                `;
            }

            card.innerHTML = html;
            grid.appendChild(card);
        });

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                tool.style.display = 'block';
                setTimeout(() => { tool.style.display = 'none'; }, 1500);
            });
        }
    </script>
</body>
</html>
